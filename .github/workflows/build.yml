name: Build U-Boot for XR1710G

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'doc/**'
  pull_request:
    branches:
      - main
      - master

env:
  CROSS_COMPILE: aarch64-linux-gnu-
  DEFCONFIG: xr1710g_defconfig
  ARCH: arm

permissions:
  contents: write

jobs:
  build:
    name: Build U-Boot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            build-essential \
            bison \
            flex \
            swig \
            python3-dev \
            python3-setuptools \
            python3-pyelftools \
            libssl-dev \
            device-tree-compiler \
            bc

      - name: Configure
        run: |
          make ${DEFCONFIG}

      - name: Build U-Boot
        run: |
          make -j$(nproc) all

      - name: Get version info
        id: version
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          # U-Boot 版本号从编译生成的头文件读取
          VERSION=$(sed -n 's/.*PLAIN_VERSION "\(.*\)".*/\1/p' include/generated/version_autogenerated.h 2>/dev/null | head -1)
          if [ -z "$VERSION" ]; then
            VERSION=$(date +%Y.%m)
          fi
          echo "commit=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Parsed version: ${VERSION}"

      - name: List build output
        run: |
          ls -la u-boot.bin u-boot.img u-boot.dtb || true
          ls -la tools/mkimage tools/dumpimage || true

      - name: Package chainloader slot image
        run: |
          chmod +x chainloader/build-chainloader-fit.sh
          ./chainloader/build-chainloader-fit.sh \
            u-boot.bin \
            out \
            tools/mkimage \
            tools/dumpimage
          ls -la out/

      - name: Generate flash-slot.bin with version name
        id: slotname
        run: |
          COMMIT_SHORT=${{ steps.version.outputs.commit }}
          VERSION=${{ steps.version.outputs.version }}
          DATE=${{ steps.version.outputs.date }}
          SLOT_NAME="xr1710g-uboot-v${VERSION}-${COMMIT_SHORT}-flash-slot.bin"
          FIT_NAME="xr1710g-uboot-v${VERSION}-${COMMIT_SHORT}-chainloader.itb"
          cp out/xr1710g-chainloader-slot.bin "out/${SLOT_NAME}"
          cp out/xr1710g-chainloader.itb "out/${FIT_NAME}"
          echo "slot_name=${SLOT_NAME}" >> $GITHUB_OUTPUT
          echo "fit_name=${FIT_NAME}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${DATE}-${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          sha256sum "out/${SLOT_NAME}"
          sha256sum "out/${FIT_NAME}"

      - name: Prepare artifacts
        run: |
          mkdir -p build-output
          cp u-boot.bin build-output/
          cp u-boot.img build-output/
          cp u-boot.dtb build-output/ 2>/dev/null || true
          cp tools/mkimage build-output/ 2>/dev/null || true
          cp out/xr1710g-chainloader-slot.bin build-output/
          cp out/xr1710g-chainloader.itb build-output/
          cp "out/${{ steps.slotname.outputs.slot_name }}" build-output/
          cp "out/${{ steps.slotname.outputs.fit_name }}" build-output/
          echo "Build date: $(date)" > build-output/build-info.txt
          echo "Commit: $(git rev-parse HEAD)" >> build-output/build-info.txt
          echo "Commit short: $(git rev-parse --short HEAD)" >> build-output/build-info.txt
          echo "Branch: $(git branch --show-current)" >> build-output/build-info.txt
          echo "U-Boot version: ${{ steps.version.outputs.version }}" >> build-output/build-info.txt
          echo "" >> build-output/build-info.txt
          echo "Flash slot image: ${{ steps.slotname.outputs.slot_name }}" >> build-output/build-info.txt
          echo "Chainloader FIT: ${{ steps.slotname.outputs.fit_name }}" >> build-output/build-info.txt
          echo "" >> build-output/build-info.txt
          echo "SHA256 sums:" >> build-output/build-info.txt
          sha256sum "out/${{ steps.slotname.outputs.slot_name }}" >> build-output/build-info.txt
          sha256sum "out/${{ steps.slotname.outputs.fit_name }}" >> build-output/build-info.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xr1710g-uboot-${{ steps.version.outputs.date }}-${{ steps.version.outputs.commit }}
          path: build-output/
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.slotname.outputs.tag }}"
          gh release create "$TAG" \
            "out/${{ steps.slotname.outputs.slot_name }}" \
            "out/${{ steps.slotname.outputs.fit_name }}" \
            --title "XR1710G U-Boot ${{ steps.version.outputs.version }} (${{ steps.version.outputs.date }})" \
            --notes "Automated build from commit ${{ steps.version.outputs.commit }}

          ## Files

          - **flash-slot.bin** — Flash through HTTP Recovery \`uboot\` target
          - **chainloader.itb** — RAM-only validation via TFTP

          ## SHA256

          $(sha256sum "out/${{ steps.slotname.outputs.slot_name }}" | awk '{print $1}  $2}')
          $(sha256sum "out/${{ steps.slotname.outputs.fit_name }}" | awk '{print $1}  $2}')

          ## Flash via HTTP Recovery

          1. Connect PC to 10GbE port (DHCP mode)
          2. Hold reset button until LED shows recovery pattern
          3. Open http://192.168.255.1
          4. Select \`uboot\` target, upload **flash-slot.bin**"
